                <label for="mensaje">Mensaje</label>
                <label for="mascotas">¿Tenés mascotas actualmente?</label>
<select id="mascotas" name="mascotas">
    <option value="no">No tengo</option>

    <option value="gato">Sí, tengo gato</option>
    <option value="varios">Sí, tengo varios</option>
</select>
                <textarea id="mensaje" name="mensaje" placeholder="Escribí tu mensaje acá"></textarea>
